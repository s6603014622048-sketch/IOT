<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ควบคุม ESP32</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            margin-top: 50px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: auto;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .btn-on {
            background-color: #28a745; /* สีเขียว */
        }
        .btn-off {
            background-color: #dc3545; /* สีแดง */
        }
        button:active {
            transform: scale(0.95); /* เอฟเฟกต์ตอนกดปุ่มยุบลง */
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ควบคุม Output Pin 1</h2>
        
        <button class="btn-on" onclick="sendCommand('on')">เปิด (ON)</button>
        <button class="btn-off" onclick="sendCommand('off')">ปิด (OFF)</button>
        
        <p id="status">สถานะ: รอการสั่งงาน...</p>
    </div>

    <script>
        // *** จุดสำคัญ: ต้องเปลี่ยนเลข IP นี้ให้ตรงกับ IP ของบอร์ดคุณ ***
        const esp32_IP = "http://172.20.10.2"; 

        function sendCommand(action) {
            const statusText = document.getElementById('status');
            statusText.style.color = "#007BFF";
            statusText.innerText = `กำลังส่งคำสั่ง: ${action.toUpperCase()}...`;

            // ส่ง Request ไปที่ http://<IP>/on หรือ http://<IP>/off
            fetch(`${esp32_IP}/${action}`, { mode: 'no-cors' })
                .then(() => {
                    statusText.style.color = "#28a745";
                    statusText.innerText = `สถานะ: ส่งคำสั่งสำเร็จ (${action.toUpperCase()})`;
                })
                .catch(error => {
                    statusText.style.color = "#dc3545";
                    statusText.innerText = "สถานะ: ไม่สามารถเชื่อมต่อกับบอร์ดได้";
                    console.error('Error:', error);
                });
        }
    </script>

</body>
</html>
